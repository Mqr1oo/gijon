<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>La Marea &mdash; Menú digital, Gijón</title>
<meta name="description" content="Menú digital de La Marea, cocina asturiana en Gijón.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b2b3c;
    --navy-deep:#081f2c;
    --navy-panel:#123249;
    --foam:#8fd1c2;
    --foam-dim:#5fa596;
    --gold:#c69436;
    --gold-bright:#e0ac48;
    --paper:#f3ecdc;
    --paper-dim:#e7dcc4;
    --ink:#1c2b2e;
    --ink-soft:#4a5a5c;
    --coral:#c1553a;
    --radius:4px;
    --radius-md:14px;
    --radius-lg:20px;
    --max-w:1180px;
  }

  *{ box-sizing:border-box; }
  
  html, body {
    overflow-x: hidden;
    width: 100%;
    position: relative;
  }
  
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing: antialiased;
  }
  img{ max-width:100%; display:block; }
  a{ color:inherit; }

  :focus-visible{
    outline:2px solid var(--gold-bright);
    outline-offset:3px;
  }

  h1,h2,h3{
    font-family:'Fraunces', serif;
    margin:0;
    font-weight:600;
  }

  .wrap{
    max-width:var(--max-w);
    margin:0 auto;
    padding:0 20px;
  }

  /* ---------- HERO ---------- */
  .hero{
    background:
      radial-gradient(ellipse at 80% 0%, rgba(143,209,194,0.10), transparent 55%),
      linear-gradient(180deg, var(--navy-deep), var(--navy) 70%);
    color:var(--paper);
    padding:60px 0 0;
    overflow:hidden;
    position:relative;
  }
  .top-actions{
    position:absolute;
    top:20px; right:20px;
    z-index:2;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .lang-toggle, .fav-shortcut{
    font-family:'Space Mono', monospace;
    font-size:12px;
    letter-spacing:.04em;
    padding:8px 14px;
    min-height:40px;
    border-radius:100px;
    border:1.5px solid var(--foam-dim);
    background:rgba(8,31,44,0.35);
    color:var(--paper);
    cursor:pointer;
    transition:background .2s, transform .15s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .lang-toggle:hover, .fav-shortcut:hover{ background:rgba(8,31,44,0.6); }
  .lang-toggle:active, .fav-shortcut:active{ transform:scale(0.92); }
  .fav-shortcut{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 12px 8px 10px;
  }
  .fav-shortcut svg{ width:18px; height:18px; flex-shrink:0; }
  .fav-shortcut path{ fill:none; stroke:var(--paper); stroke-width:2; transition:fill .2s, stroke .2s; stroke-linejoin:round; stroke-linecap:round;}
  .fav-shortcut.has-favs{ border-color:var(--coral); }
  .fav-shortcut.has-favs path{ fill:var(--coral); stroke:var(--coral); }
  .fav-count{ min-width:14px; text-align:left; font-weight: 600;}
  .hero-inner{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:32px;
    padding-bottom:30px;
    padding-top:24px;
  }
  .hero-text{ flex:1 1 340px; min-width:260px; }
  .eyebrow{
    font-family:'Space Mono', monospace;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--foam);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .eyebrow::before{
    content:"";
    width:22px; height:1px;
    background:var(--foam-dim);
    display:inline-block;
  }
  .hero h1{
    font-size:clamp(2.4rem, 8vw, 4.4rem);
    line-height:0.98;
    letter-spacing:-0.01em;
  }
  .hero h1 em{
    font-style:italic;
    color:var(--gold-bright);
    font-weight:500;
  }
  .hero p.tag{
    margin-top:18px;
    max-width:46ch;
    color:#cfe3de;
    font-size:1.02rem;
  }
  .hero-meta{
    margin-top:26px;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    font-family:'Space Mono', monospace;
    font-size:12.5px;
    color:var(--foam);
  }
  .hero-meta span{ display:block; color:#8fa9a3; font-size:11px; letter-spacing:.06em; margin-bottom:3px; }

  .sea-wrap{
    flex:1 1 240px;
    min-width:220px;
    max-width:320px;
    margin:0 auto;
    display:flex;
    justify-content:center;
  }
  .sea-svg{ width:100%; height:auto; }

  .wave-group{ animation:drift 14s linear infinite; }
  .wave-group.back{ animation-duration:20s; animation-direction:reverse; opacity:0.55; }
  @keyframes drift{ from{ transform:translateX(0); } to{ transform:translateX(-150px); } }

  .boat{ transform-origin:150px 108px; animation:bob 3.2s ease-in-out infinite; }
  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-2deg); }
    50%{ transform:translateY(-5px) rotate(2deg); }
  }

  .gull{ animation:fly 5s ease-in-out infinite; }
  .gull.g2{ animation-duration:6.5s; animation-delay:.6s; }
  @keyframes fly{
    0%,100%{ transform:translate(0,0); }
    50%{ transform:translate(-8px,-6px); }
  }

  @media (prefers-reduced-motion: reduce){
    .wave-group, .boat, .gull{ animation:none; }
  }

  /* wave divider */
  .wave-divider{ display:block; width:100%; height:40px; background:var(--paper); }
  .wave-divider svg{ width:100%; height:100%; display:block; }

  /* ---------- CONTROLS ---------- */
  .controls{
    padding: 24px 0 10px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .search-box{
    display: flex;
    align-items: center;
    background: #fff;
    border: 1.5px solid var(--paper-dim);
    border-radius: var(--radius-md);
    padding: 0 14px;
    height: 48px;
    width: 100%;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-box:focus-within {
    border-color: var(--foam-dim);
    box-shadow: 0 6px 16px rgba(143,209,194,0.18);
  }
  .search-icon{
    width: 18px; 
    height: 18px;
    flex-shrink: 0;
    margin-right: 10px;
  }
  .search-icon path{ fill: none; stroke: var(--ink-soft); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  
  .search-box input{
    flex: 1;
    border: none;
    background: transparent;
    padding: 0;
    height: 100%;
    font-family: 'Work Sans', sans-serif;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .search-box input::placeholder { color: #8c9799; }

  .tag-filters{
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 4px 2px 12px;
    scrollbar-width: none;
  }
  .tag-filters::-webkit-scrollbar { display: none; }
  
  .chip{
    font-family:'Space Mono', monospace;
    font-size:13px;
    letter-spacing:.03em;
    padding: 0 16px;
    min-height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 100px;
    border: 1.5px solid var(--navy-panel);
    background: #fff;
    color: var(--navy-panel);
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, color .2s, transform .15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:active{ transform: translateY(0) scale(0.94); }
  .chip.active{
    background: var(--navy); 
    color: var(--paper); 
    border-color: var(--navy);
    font-weight: 700;
    box-shadow: 0 4px 12px rgba(11,43,60,0.3);
  }
  
  /* ---------- CATEGORY SECTIONS / GRID ---------- */
  .menu-section{ padding: 10px 0 120px; /* Padding mărit pt bara de total */ }
  .category-section{ margin-top:38px; }
  .category-section h2{
    font-size:1.5rem;
    padding-bottom:8px;
    border-bottom:2px solid var(--gold);
    display:inline-block;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:22px;
    margin-top:22px;
  }

  @keyframes fadeUpIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .card{
    background:#fff;
    border-radius:var(--radius-lg);
    overflow:hidden;
    box-shadow:0 4px 12px rgba(11,43,60,0.06);
    border:1px solid var(--paper-dim);
    display:flex;
    flex-direction:column;
    transition:transform .25s ease, box-shadow .25s ease;
    opacity: 0;
    animation: fadeUpIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  .card:hover{ transform:translateY(-6px); box-shadow:0 16px 32px rgba(11,43,60,0.12); }
  .card-img-wrap{ position:relative; overflow:hidden; }
  .card-img{ aspect-ratio:4/3; width:100%; object-fit:cover; background:var(--paper-dim); transition: transform 0.5s ease; }
  .card:hover .card-img { transform: scale(1.05); }

  /* RIBBON "ESPECIALIDAD" */
  .ribbon {
    position: absolute;
    top: 14px;
    left: -6px;
    background: var(--gold-bright);
    color: #fff;
    padding: 6px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-radius: 0 4px 4px 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .ribbon::before {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 0;
    border-top: 6px solid #b8862d;
    border-left: 6px solid transparent;
  }

  @keyframes heartPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .fav-btn{
    position:absolute;
    top:12px; right:12px;
    width:42px; height:42px; 
    border-radius:50%;
    border:none;
    background:rgba(8,31,44,0.45);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s;
    z-index: 10;
  }
  .fav-btn svg{ width:22px; height:22px; }
  .fav-btn path{ fill:none; stroke:#f3ecdc; stroke-width:1.8; transition:fill .25s, stroke .25s; stroke-linejoin:round; stroke-linecap:round; }
  .fav-btn.active{ background:rgba(193,85,58,0.95); }
  .fav-btn.active path{ fill:#f3ecdc; stroke:#f3ecdc; }
  .fav-btn.pop-anim svg { animation: heartPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  .card-body{ padding:18px; display:flex; flex-direction:column; gap:10px; flex:1; }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .card-top h3{ font-size:1.18rem; line-height:1.2; margin:0;}
  .price{ font-family:'Space Mono', monospace; font-weight:700; color:var(--gold); white-space:nowrap; font-size:1.05rem; }
  .desc{ font-size:14px; color:var(--ink-soft); margin:0; line-height: 1.45;}
  .ingredients{ font-size:13px; color:var(--ink-soft); margin:0; }
  .ingredients b{ color:var(--ink); font-weight:600; }
  
  .allergens-wrap{ margin-top:auto; padding-top:12px; border-top: 1px dashed var(--paper-dim); }
  .allergen-label { display: block; font-size: 11px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .allergens{ display:flex; flex-wrap:wrap; gap:6px; }
  .allergen-pill{
    font-family:'Space Mono', monospace; font-size:11px; letter-spacing:.02em; 
    padding:4px 10px; border-radius:100px; background:rgba(193,85,58,0.12); color:var(--coral); font-weight: 600;
  }
  .no-allergens{ font-family:'Space Mono', monospace; font-size:11px; color:var(--foam-dim); font-weight:600; }
  
  .tag-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
  .tag-pill{ font-size:11px; font-family:'Space Mono', monospace; color:var(--navy-panel); background:rgba(18,50,73,0.06); padding:4px 10px; border-radius:100px; font-weight: 600;}

  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-soft); font-family:'Space Mono', monospace; font-size:14px; }

  /* ---------- TOTAL BAR (Sticky Bottom) ---------- */
  .total-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--paper-dim);
    padding: 16px 20px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    transform: translateY(120%);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 -4px 20px rgba(11,43,60,0.08);
  }
  .total-bar.show { transform: translateY(0); }
  .total-info { display: flex; flex-direction: column; }
  .total-label { font-size: 13px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;}
  .total-amount { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; color: var(--navy-deep); }
  
  .btn-whatsapp {
    background: #25D366; /* Culoare oficială WhatsApp */
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 100px;
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
    transition: transform 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-whatsapp:active { transform: scale(0.96); background: #20bd5a; }
  .btn-whatsapp svg { width: 20px; height: 20px; fill: currentColor; }

  /* ---------- SCROLL TO TOP BTN ---------- */
  .scroll-top-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 48px;
    height: 48px;
    background: var(--navy);
    color: var(--paper);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(11,43,60,0.25);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .scroll-top-btn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .scroll-top-btn.lift { bottom: 90px; /* Lift up if total bar is showing */ }
  .scroll-top-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round;}
  .scroll-top-btn:active { background: var(--navy-deep); transform: scale(0.92); }

  /* ---------- FOOTER ---------- */
  footer{ background:var(--navy-deep); color:#a9c0ba; padding:40px 0 26px; font-size:13.5px; }
  .footer-inner{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; align-items:center; }
  footer .brand{ font-family:'Fraunces', serif; color:var(--paper); font-size:1.1rem; }
  .footer-links{ display:flex; gap:20px; flex-wrap:wrap; align-items:center; }
  .footer-links button{ background:none; border:none; color:#a9c0ba; font-family:'Work Sans', sans-serif; font-size:13.5px; cursor:pointer; text-decoration:underline; text-underline-offset:3px; padding:0; }

  /* ---------- MODAL ---------- */
  .modal-overlay{ position:fixed; inset:0; background:rgba(8,31,44,0.6); display:none; align-items:center; justify-content:center; padding:20px; z-index:150; }
  .modal-overlay.open{ display:flex; }
  .modal{ background:var(--paper); max-width:560px; width:100%; max-height:80vh; overflow-y:auto; border-radius:var(--radius-lg); padding:30px; position:relative; }
  .modal h2{ font-size:1.4rem; margin-bottom:14px; }
  .modal p{ font-size:14px; color:var(--ink-soft); margin:0 0 12px; }
  .modal-close{ position:absolute; top:14px; right:14px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft); line-height:1; padding:8px; }

  /* --- MEDIA QUERIES --- */
  @media (max-width:640px){
    .hero{ padding-top:44px; }
    .top-actions{ top:14px; right:14px; gap:6px; }
    .lang-toggle, .fav-shortcut{ padding:6px 12px; font-size:12px; min-height:36px; }
    .fav-shortcut{ padding-left:10px; }
    .hero-inner{ text-align:center; justify-content:center; }
    .hero-meta{ justify-content:center; }
    .tag-filters { margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
    .footer-inner{ flex-direction:column; align-items:flex-start; }
    .grid{ grid-template-columns:1fr; }
  }
  @media (min-width:641px){
    .controls { flex-direction: row; align-items: center; justify-content: space-between; }
    .search-box { max-width: 340px; }
    .grid{ grid-template-columns:repeat(2, 1fr); }
  }
  @media (min-width:901px){ .grid{ grid-template-columns:repeat(3, 1fr); } }
</style>
</head>
<body>

<header class="hero">
  <div class="top-actions">
    <button class="fav-shortcut" id="favShortcut" type="button" aria-label="Ver favoritos">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <span class="fav-count" id="favCount">0</span>
    </button>
    <button class="lang-toggle" id="langToggle" type="button">EN</button>
  </div>
  <div class="wrap hero-inner">
    <div class="hero-text">
      <p class="eyebrow" id="txtEyebrow">Gijón &middot; Menú digital</p>
      <h1 id="txtTitle">La Marea<br><em id="txtTitleEm">menú digital</em></h1>
      <p class="tag" id="txtTagline">Cocina asturiana a pie de puerto: fabada, mariscos frescos y lo que trae el mar cada mañana.</p>
      <div class="hero-meta">
        <div><span id="txtHoursLabel">Horario</span><span id="txtHoursValue">13:00 &ndash; 23:30</span></div>
      </div>
    </div>
    <div class="sea-wrap" aria-hidden="true">
      <svg class="sea-svg" viewBox="0 0 300 220" fill="none">
        <path class="gull g1" d="M60 40 q6 -8 12 0 q6 -8 12 0" stroke="#8fd1c2" stroke-width="2" stroke-linecap="round"/>
        <path class="gull g2" d="M210 60 q5 -7 10 0 q5 -7 10 0" stroke="#8fd1c2" stroke-width="2" stroke-linecap="round"/>
        <g class="boat">
          <path d="M136 96 L164 96 L160 104 L140 104 Z" fill="#e0ac48"/>
          <rect x="149" y="70" width="2" height="28" fill="#f3ecdc"/>
          <path d="M151 72 L151 92 L166 92 Z" fill="#8fd1c2" opacity="0.85"/>
        </g>
        <g class="wave-group back">
          <path d="M0 140 Q37 122 75 140 T150 140 T225 140 T300 140 T375 140 T450 140 V220 H0 Z" fill="#123249"/>
        </g>
        <g class="wave-group">
          <path d="M0 150 Q37 168 75 150 T150 150 T225 150 T300 150 T375 150 T450 150 V220 H0 Z" fill="#0b2b3c"/>
        </g>
      </svg>
    </div>
  </div>
  <div class="wave-divider" aria-hidden="true">
    <svg viewBox="0 0 1200 40" preserveAspectRatio="none">
      <path d="M0 20 C 150 40, 350 0, 600 20 C 850 40, 1050 0, 1200 20 L1200 40 L0 40 Z" fill="#f3ecdc"/>
    </svg>
  </div>
</header>

<main class="wrap menu-section">
  <div class="controls">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14zm10 17-5.6-5.6"/></svg>
      <input type="search" id="searchInput" aria-label="Buscar" placeholder="Buscar un plato...">
    </div>
    <div class="tag-filters" id="tagFilters" role="group" aria-label="Filtrar"></div>
  </div>

  <div id="categoriesWrap" aria-live="polite"></div>
  <div class="empty-state" id="emptyState" style="display:none;"></div>
</main>

<!-- BARA DE TOTAL FIXĂ -->
<div class="total-bar" id="totalBar">
  <div class="total-info">
    <span class="total-label" id="txtTotalLabel">Total:</span>
    <span class="total-amount" id="totalAmount">0.00 €</span>
  </div>
  <button class="btn-whatsapp" id="shareOrderBtn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span id="txtShareOrder">Pedir</span>
  </button>
</div>

<!-- BUTON SCROLL TO TOP -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Volver arriba">
  <svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<footer>
  <div class="wrap footer-inner">
    <div class="brand">La Marea</div>
    <div class="footer-links">
      <button type="button" id="openLegal"></button>
      <span id="txtFooterCopy">&copy; 2026 La Marea, Gijón</span>
    </div>
  </div>
</footer>

<div class="modal-overlay" id="legalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="legalTitle">
    <button class="modal-close" id="closeLegal" aria-label="Cerrar">&times;</button>
    <h2 id="legalTitle"></h2>
    <p id="legalP1"></p>
    <p id="legalP2"></p>
    <p id="legalP3"></p>
  </div>
</div>

<script>
(function(){
  const categoriesWrap = document.getElementById('categoriesWrap');
  const emptyState = document.getElementById('emptyState');
  const searchInput = document.getElementById('searchInput');
  const tagFiltersEl = document.getElementById('tagFilters');
  const langToggle = document.getElementById('langToggle');
  const favShortcut = document.getElementById('favShortcut');
  const favCountEl = document.getElementById('favCount');
  const htmlRoot = document.getElementById('htmlRoot');
  const totalBar = document.getElementById('totalBar');
  const totalAmount = document.getElementById('totalAmount');
  const shareOrderBtn = document.getElementById('shareOrderBtn');
  const scrollTopBtn = document.getElementById('scrollTopBtn');

  const CATEGORIES = [
    { key:'entrante', es:'Entrantes', en:'Starters' },
    { key:'principal', es:'Principales', en:'Mains' },
    { key:'postre', es:'Postres', en:'Desserts' },
    { key:'bebida', es:'Bebidas', en:'Drinks' }
  ];
  const OTHER_LABEL = { es:'Otros', en:'Other' };

  const TAG_LABELS = {
    'tradicional': { es:'tradicional', en:'traditional' },
    'especialidad': { es:'especialidad', en:'signature' },
    'para compartir': { es:'para compartir', en:'to share' },
    'marisco': { es:'marisco', en:'seafood' },
    'temporada': { es:'temporada', en:'seasonal' },
    'queso': { es:'queso', en:'cheese' },
    'sidra': { es:'sidra', en:'cider' },
    'sin gluten': { es:'sin gluten', en:'gluten-free' }
  };
  const ALLERGEN_LABELS = {
    'Gluten': { es:'Gluten', en:'Gluten' },
    'Lácteos': { es:'Lácteos', en:'Dairy' },
    'Huevo': { es:'Huevo', en:'Egg' },
    'Marisco': { es:'Marisco', en:'Shellfish' },
    'Pescado': { es:'Pescado', en:'Fish' },
    'Sulfitos': { es:'Sulfitos', en:'Sulphites' },
    'Frutos secos': { es:'Frutos secos', en:'Nuts' }
  };

  const UI = {
    es: {
      eyebrow: 'Gijón · Menú digital',
      titleEm: 'menú digital',
      tagline: 'Cocina asturiana a pie de puerto: fabada, mariscos frescos y lo que trae el mar cada mañana.',
      hoursLabel: 'Horario',
      hoursValue: '13:00 – 23:30',
      searchPlaceholder: 'Buscar un plato…',
      allChip: 'Todos',
      ingredientsLabel: 'Ingredientes:',
      allergensLabel: 'Alérgenos:',
      noAllergens: 'Sin alérgenos',
      emptyState: 'Ningún plato coincide con tu búsqueda.',
      loadError: 'No se pudo cargar el menú. Comprueba que menu.json esté disponible.',
      legalLinkText: 'Aviso legal y privacidad',
      footerCopy: '© 2026 La Marea, Gijón',
      modalTitle: 'Aviso legal y privacidad',
      modalP1: 'Los precios, ingredientes y disponibilidad de los platos mostrados en este menú pueden variar sin previo aviso. Recomendamos confirmar alérgenos e ingredientes directamente con el personal del restaurante antes de realizar un pedido.',
      modalP2: 'Esta web no utiliza cookies de seguimiento ni herramientas de analítica.',
      modalP3: 'El uso de este menú digital implica la aceptación de que la información aquí mostrada tiene carácter orientativo.',
      favAdd: 'Añadir a favoritos',
      favRemove: 'Quitar de favoritos',
      favShortcutLabel: 'Ver favoritos',
      toggleLabel: 'EN',
      totalLabel: 'Total:',
      shareOrder: 'Pedir',
      ribbonSpecial: 'Especialidad',
      whatsappIntro: '¡Hola! Me gustaría pedir lo siguiente:'
    },
    en: {
      eyebrow: 'Gijón · Digital menu',
      titleEm: 'digital menu',
      tagline: 'Asturian cooking by the harbour: fabada, fresh seafood and whatever the sea brings in each morning.',
      hoursLabel: 'Hours',
      hoursValue: '1:00 pm – 11:30 pm',
      searchPlaceholder: 'Search a dish…',
      allChip: 'All',
      ingredientsLabel: 'Ingredients:',
      allergensLabel: 'Allergens:',
      noAllergens: 'No allergens',
      emptyState: 'No dishes match your search.',
      loadError: 'Could not load the menu. Check that menu.json is available.',
      legalLinkText: 'Legal notice & privacy',
      footerCopy: '© 2026 La Marea, Gijón',
      modalTitle: 'Legal notice & privacy',
      modalP1: 'Prices, ingredients and availability of the dishes shown in this menu may change without notice.',
      modalP2: 'This site uses no tracking cookies and no analytics tools.',
      modalP3: 'Using this digital menu implies acceptance that the information shown here is for guidance only.',
      favAdd: 'Add to favorites',
      favRemove: 'Remove from favorites',
      favShortcutLabel: 'View favorites',
      toggleLabel: 'ES',
      totalLabel: 'Total:',
      shareOrder: 'Order',
      ribbonSpecial: 'Signature',
      whatsappIntro: 'Hi! I would like to order the following:'
    }
  };

  const FAVORITES_KEY = 'laMarea:favorites';
  const LANG_KEY = 'laMarea:lang';

  let allItems = [];
  let activeFilter = 'all';
  let favorites = loadFavorites();
  let currentLang = loadLang();

  function loadFavorites(){
    try{
      const raw = window.localStorage.getItem(FAVORITES_KEY);
      return new Set(raw ? JSON.parse(raw) : []);
    }catch(e){ return new Set(); }
  }
  function saveFavorites(){
    try{ window.localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.from(favorites))); }
    catch(e){}
  }
  function loadLang(){
    try{ return window.localStorage.getItem(LANG_KEY) === 'en' ? 'en' : 'es'; }
    catch(e){ return 'es'; }
  }
  function saveLang(){
    try{ window.localStorage.setItem(LANG_KEY, currentLang); }catch(e){}
  }

  function updateFavShortcut(){
    favCountEl.textContent = String(favorites.size);
    favShortcut.classList.toggle('has-favs', favorites.size > 0);
  }

  function isFavorite(item){ return favorites.has(String(item.imageNumber)); }
  function toggleFavorite(item){
    const id = String(item.imageNumber);
    if(favorites.has(id)) favorites.delete(id); else favorites.add(id);
    saveFavorites();
  }

  function itemText(item){
    if(currentLang === 'en' && item.translations && item.translations.en){
      const t = item.translations.en;
      return {
        name: t.name || item.name, description: t.description || item.description,
        ingredients: t.ingredients || item.ingredients, allergens: t.allergens || item.allergens
      };
    }
    return { name:item.name, description:item.description, ingredients:item.ingredients, allergens:item.allergens };
  }
  function tagLabel(tag){ return (TAG_LABELS[tag] && TAG_LABELS[tag][currentLang]) || tag; }
  function allergenLabel(a){ return (ALLERGEN_LABELS[a] && ALLERGEN_LABELS[a][currentLang]) || a; }
  function categoryOf(item){
    const found = CATEGORIES.find(c => item.tags.includes(c.key));
    return found ? found.key : 'otros';
  }
  function categoryLabel(key){
    const found = CATEGORIES.find(c => c.key === key);
    return found ? found[currentLang] : OTHER_LABEL[currentLang];
  }

  function localImagePath(imageNumber){ return `images/${imageNumber}.jpg`; }
  function fallbackImageUrl(item){
    let seed = 0;
    if(item.name) { for (let i = 0; i < item.name.length; i++) seed += item.name.charCodeAt(i); }
    return `https://loremflickr.com/480/360/food,dish,meal?lock=${seed}`;
  }

  function applyStaticText(){
    const t = UI[currentLang];
    htmlRoot.lang = currentLang;
    langToggle.textContent = t.toggleLabel;
    favShortcut.setAttribute('aria-label', t.favShortcutLabel);
    document.getElementById('txtEyebrow').textContent = t.eyebrow;
    document.getElementById('txtTitleEm').textContent = t.titleEm;
    document.getElementById('txtTagline').textContent = t.tagline;
    document.getElementById('txtHoursLabel').textContent = t.hoursLabel;
    document.getElementById('txtHoursValue').textContent = t.hoursValue;
    searchInput.placeholder = t.searchPlaceholder;
    searchInput.setAttribute('aria-label', t.searchPlaceholder);
    emptyState.textContent = t.emptyState;
    document.getElementById('openLegal').textContent = t.legalLinkText;
    document.getElementById('txtFooterCopy').textContent = t.footerCopy;
    document.getElementById('legalTitle').textContent = t.modalTitle;
    document.getElementById('legalP1').textContent = t.modalP1;
    document.getElementById('legalP2').textContent = t.modalP2;
    document.getElementById('legalP3').textContent = t.modalP3;
    document.getElementById('txtTotalLabel').textContent = t.totalLabel;
    document.getElementById('txtShareOrder').textContent = t.shareOrder;
  }

  function renderTagFilters(){
    tagFiltersEl.innerHTML = '';
    const t = UI[currentLang];

    const allChip = document.createElement('button');
    allChip.className = 'chip active';
    allChip.type = 'button';
    allChip.textContent = t.allChip;
    allChip.addEventListener('click', () => setActiveFilter('all'));
    tagFiltersEl.appendChild(allChip);

    CATEGORIES.forEach(cat => {
      if(!allItems.some(i => categoryOf(i) === cat.key)) return;
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.type = 'button';
      chip.textContent = cat[currentLang];
      chip.dataset.filter = cat.key;
      chip.addEventListener('click', () => setActiveFilter(cat.key));
      tagFiltersEl.appendChild(chip);
    });

    highlightActiveChip();
    updateFavShortcut();
  }

  function highlightActiveChip(){
    Array.from(tagFiltersEl.children).forEach(chip => {
      const key = chip.dataset.filter || 'all';
      chip.classList.toggle('active', key === activeFilter);
    });
  }

  function setActiveFilter(key){
    activeFilter = key;
    highlightActiveChip();
    render();
  }

  function matchesSearch(item, query){
    if(!query) return true;
    const text = itemText(item);
    return (text.name + ' ' + text.description + ' ' + text.ingredients.join(' ')).toLowerCase().includes(query);
  }

  function heartIconSvg(){
    return '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
  }

  function updateWhatsAppLink(favItems, totalAmountVal) {
    const t = UI[currentLang];
    let msg = t.whatsappIntro + "\n\n";
    favItems.forEach(item => {
      msg += `- ${itemText(item).name} (${item.price.toFixed(2)} €)\n`;
    });
    msg += `\n*Total: ${totalAmountVal.toFixed(2)} €*`;
    
    shareOrderBtn.onclick = () => {
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    };
  }

  function buildCard(item, index){
    const t = UI[currentLang];
    const text = itemText(item);
    const card = document.createElement('article');
    card.className = 'card';
    card.style.animationDelay = `${index * 0.05}s`;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';

    // Panglică pentru „Especialidad”
    if(item.tags && item.tags.includes('especialidad')){
      const ribbon = document.createElement('div');
      ribbon.className = 'ribbon';
      ribbon.textContent = t.ribbonSpecial;
      imgWrap.appendChild(ribbon);
    }

    const img = document.createElement('img');
    img.className = 'card-img';
    img.loading = 'lazy';
    img.alt = text.name;
    img.src = localImagePath(item.imageNumber);
    img.addEventListener('error', function onErr(){
      img.removeEventListener('error', onErr);
      img.src = fallbackImageUrl(item);
    });
    imgWrap.appendChild(img);

    const favBtn = document.createElement('button');
    favBtn.type = 'button';
    favBtn.className = 'fav-btn' + (isFavorite(item) ? ' active' : '');
    favBtn.setAttribute('aria-pressed', String(isFavorite(item)));
    favBtn.setAttribute('aria-label', isFavorite(item) ? t.favRemove : t.favAdd);
    favBtn.innerHTML = heartIconSvg();
    
    favBtn.addEventListener('click', () => {
      favBtn.classList.remove('pop-anim');
      void favBtn.offsetWidth; 
      favBtn.classList.add('pop-anim');
      
      toggleFavorite(item);
      const isFavNow = isFavorite(item);
      favBtn.classList.toggle('active', isFavNow);
      favBtn.setAttribute('aria-pressed', String(isFavNow));
      favBtn.setAttribute('aria-label', isFavNow ? t.favRemove : t.favAdd);
      
      updateFavShortcut();
      if(activeFilter === 'favorites') render(); // Re-render if removing from favs view
      
      setTimeout(() => favBtn.classList.remove('pop-anim'), 400);
    });
    imgWrap.appendChild(favBtn);
    card.appendChild(imgWrap);

    const body = document.createElement('div');
    body.className = 'card-body';

    const top = document.createElement('div');
    top.className = 'card-top';
    const h3 = document.createElement('h3');
    h3.textContent = text.name;
    const price = document.createElement('span');
    price.className = 'price';
    price.textContent = `${item.price.toFixed(2)} €`;
    top.appendChild(h3);
    top.appendChild(price);
    body.appendChild(top);

    const desc = document.createElement('p');
    desc.className = 'desc';
    desc.textContent = text.description;
    body.appendChild(desc);

    const ingredients = document.createElement('p');
    ingredients.className = 'ingredients';
    ingredients.innerHTML = `<b>${t.ingredientsLabel}</b> ${text.ingredients.join(', ')}`;
    body.appendChild(ingredients);

    if(item.tags && item.tags.length){
      const tagRow = document.createElement('div');
      tagRow.className = 'tag-row';
      item.tags.forEach(tg => {
        if(tg !== 'especialidad') { // Nu mai punem bulină pt specialitate pt ca are panglică
          const pill = document.createElement('span');
          pill.className = 'tag-pill';
          pill.textContent = tagLabel(tg);
          tagRow.appendChild(pill);
        }
      });
      body.appendChild(tagRow);
    }

    const allergenWrap = document.createElement('div');
    allergenWrap.className = 'allergens-wrap';
    const allergenLabelEl = document.createElement('span');
    allergenLabelEl.className = 'allergen-label';
    allergenLabelEl.textContent = t.allergensLabel;
    allergenWrap.appendChild(allergenLabelEl);

    const allergenRow = document.createElement('div');
    allergenRow.className = 'allergens';
    if(text.allergens && text.allergens.length){
      text.allergens.forEach(a => {
        const pill = document.createElement('span');
        pill.className = 'allergen-pill';
        pill.textContent = allergenLabel(a);
        allergenRow.appendChild(pill);
      });
    } else {
      const none = document.createElement('span');
      none.className = 'no-allergens';
      none.textContent = t.noAllergens;
      allergenRow.appendChild(none);
    }
    
    allergenWrap.appendChild(allergenRow);
    body.appendChild(allergenWrap);

    card.appendChild(body);
    return card;
  }

  function render(){
    const query = searchInput.value.trim().toLowerCase();
    let filtered = allItems.filter(item => matchesSearch(item, query));

    // Handle Favorites & Total Bar logic
    if(activeFilter === 'favorites'){
      filtered = filtered.filter(isFavorite);
      
      if(filtered.length > 0) {
        let sum = filtered.reduce((acc, item) => acc + item.price, 0);
        totalAmount.textContent = `${sum.toFixed(2)} €`;
        updateWhatsAppLink(filtered, sum);
        totalBar.classList.add('show');
        scrollTopBtn.classList.add('lift'); // Ridică butonul de scroll peste bară
      } else {
        totalBar.classList.remove('show');
        scrollTopBtn.classList.remove('lift');
      }
    } else {
      filtered = filtered.filter(item => activeFilter === 'all' ? true : categoryOf(item) === activeFilter);
      totalBar.classList.remove('show');
      scrollTopBtn.classList.remove('lift');
    }

    categoriesWrap.innerHTML = '';

    if(filtered.length === 0){
      emptyState.textContent = UI[currentLang].emptyState;
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    const groupOrder = [...CATEGORIES.map(c => c.key), 'otros'];
    let globalCardIndex = 0;

    groupOrder.forEach(catKey => {
      const items = filtered.filter(i => categoryOf(i) === catKey);
      if(items.length === 0) return;

      const section = document.createElement('section');
      section.className = 'category-section';

      const h2 = document.createElement('h2');
      h2.textContent = categoryLabel(catKey);
      section.appendChild(h2);

      const grid = document.createElement('div');
      grid.className = 'grid';
      
      items.forEach((item) => {
        grid.appendChild(buildCard(item, globalCardIndex));
        globalCardIndex++;
      });
      
      section.appendChild(grid);
      categoriesWrap.appendChild(section);
    });
  }

  function refreshAll(){
    applyStaticText();
    renderTagFilters();
    render();
  }

  // Event Listeners
  searchInput.addEventListener('input', render);

  langToggle.addEventListener('click', () => {
    currentLang = currentLang === 'es' ? 'en' : 'es';
    saveLang();
    refreshAll();
  });

  favShortcut.addEventListener('click', () => {
    setActiveFilter('favorites');
    document.getElementById('categoriesWrap').scrollIntoView({ behavior:'smooth', block:'start' });
  });

  // Scroll to Top Logic
  window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
      scrollTopBtn.classList.add('show');
    } else {
      scrollTopBtn.classList.remove('show');
    }
  });

  scrollTopBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  fetch('menu.json')
    .then(res => {
      if(!res.ok) throw new Error('menu.json not found');
      return res.json();
    })
    .then(data => {
      allItems = data;
      applyStaticText();
      renderTagFilters();
      render();
    })
    .catch(err => {
      categoriesWrap.innerHTML = '';
      emptyState.textContent = UI[currentLang].loadError;
      emptyState.style.display = 'block';
      console.error(err);
    });

  // Modal Legal
  const overlay = document.getElementById('legalOverlay');
  const openBtn = document.getElementById('openLegal');
  const closeBtn = document.getElementById('closeLegal');

  function openModal(){ overlay.classList.add('open'); closeBtn.focus(); }
  function closeModal(){ overlay.classList.remove('open'); openBtn.focus(); }
  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

  applyStaticText();
})();
</script>

</body>
</html>
