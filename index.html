<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menús Digitales &mdash; Gijón</title>
  <meta name="description" content="Portal de menús digitales para restaurantes en Gijón.">
  
  <!-- Fonturi premium asemănătoare cu cele din meniul La Marea -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --paper: #f3ecdc;
      --navy-deep: #081f2c;
    }
    body {
      font-family: 'Work Sans', sans-serif;
      background-color: var(--paper);
      color: var(--navy-deep);
    }
    h1, h2, h3 {
      font-family: 'Fraunces', serif;
    }
    
    /* Animație subtilă de intrare */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up {
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
    }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

  <!-- Element de decor subtil pe fundal -->
  <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-[#e7dcc4] to-transparent -z-10 opacity-50"></div>

  <header class="text-center mb-12 animate-fade-up w-full max-w-2xl">
    <div class="inline-flex items-center gap-3 mb-4 text-[#5fa596] text-sm font-semibold tracking-widest uppercase">
      <span class="w-8 h-[1px] bg-[#5fa596]"></span>
      Asturias
      <span class="w-8 h-[1px] bg-[#5fa596]"></span>
    </div>
    <h1 class="text-4xl md:text-5xl font-semibold mb-4 leading-tight">
      Gijón <span class="italic text-[#c69436] font-medium">Gastronomía</span>
    </h1>
    <p class="text-[17px] text-[#4a5a5c] mt-2">
      Selecciona un restaurante para descubrir su menú digital actualizado.
    </p>
  </header>

  <div id="loading" class="text-center text-[#4a5a5c] animate-pulse my-12 w-full">
    Buscando restaurantes...
  </div>

  <div id="error" class="hidden text-center text-red-500 my-12 w-full">
    Error al cargar la lista de restaurantes.
  </div>

  <main id="restaurants-container" class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Butoanele vor fi generate și injectate aici automat de JavaScript -->
  </main>

  <script>
    // Setăm datele contului tău
    const USERNAME = 'mqr1oo'; 
    const REPO = 'gijon';

    const container = document.getElementById('restaurants-container');
    const loading = document.getElementById('loading');
    const errorDiv = document.getElementById('error');
    
    async function fetchRestaurants() {
      try {
        // Interogăm API-ul public GitHub pentru a citi fisierele/folderele din repo
        const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
        
        if (!response.ok) throw new Error('Eroare API GitHub');
        const data = await response.json();
        
        // Filtrăm rezultatele ca să păstrăm DOAR folderele (excludem fișiere ca index.html)
        const folders = data.filter(item => item.type === 'dir' && item.name !== '.git' && item.name !== 'images');
        
        loading.style.display = 'none';
        
        if (folders.length === 0) {
          container.innerHTML = '<p class="col-span-1 md:col-span-2 text-center text-[#4a5a5c]">No hay restaurantes disponibles.</p>';
          return;
        }

        // Parcurgem fiecare folder și creăm un card vizual pentru el
        folders.forEach((folder, index) => {
          const name = folder.name;
          // Facem prima literă mare (ex: fierabar devine Fierabar)
          const titleName = name.charAt(0).toUpperCase() + name.slice(1); 
          
          const a = document.createElement('a');
          a.href = `./${name}/`;
          a.className = `group block bg-white rounded-[20px] p-6 shadow-sm border border-[#e7dcc4] hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-fade-up relative overflow-hidden`;
          a.style.animationDelay = `${(index + 1) * 100}ms`;
          
          a.innerHTML = `
            <div class="absolute inset-0 bg-gradient-to-br from-[#0b2b3c] to-[#123249] opacity-0 group-hover:opacity-100 transition-opacity duration-300 -z-0"></div>
            <div class="relative z-10 group-hover:text-[#f3ecdc] transition-colors duration-300">
              <h2 class="text-2xl mb-2 text-[#0b2b3c] group-hover:text-white transition-colors duration-300 capitalize">${titleName}</h2>
              <p class="text-sm text-[#4a5a5c] group-hover:text-[#8fd1c2] transition-colors duration-300 mb-6">
                Descubre el menú digital de ${titleName}.
              </p>
              <div class="flex items-center text-sm font-semibold text-[#c69436] group-hover:text-[#e0ac48]">
                Ver menú
                <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </div>
            </div>
          `;
          container.appendChild(a);
        });
        
      } catch (error) {
        console.error("Nu s-au putut prelua datele: ", error);
        loading.style.display = 'none';
        errorDiv.classList.remove('hidden');
      }
    }

    // Rulăm automat funcția când se deschide pagina
    fetchRestaurants();
  </script>

  <footer class="mt-16 text-center text-[#4a5a5c] text-xs font-medium tracking-wide animate-fade-up delay-200">
    &copy; 2026 Menús Digitales. Gijón, Asturias.
  </footer>

</body>
</html>
